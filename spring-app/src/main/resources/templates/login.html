<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-12 col-md-6 col-lg-4">
            <div class="card shadow-sm">
                <div class="card-body p-4">
                    <h1 class="h4 mb-3">Вход</h1>
                    <div th:if="${param.logout}" class="alert alert-info">Вы вышли.</div>
                    <div th:if="${param.registered}" class="alert alert-success">Регистрация успешна. Войдите.</div>
                    <div th:if="${param.error}" class="alert alert-danger">Неверный логин или пароль.</div>
                    <form th:action="@{/login}" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                        <div class="mb-3">
                            <label class="form-label">Имя пользователя</label>
                            <input class="form-control" name="username" required autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Пароль</label>
                            <input class="form-control" type="password" name="password" required autocomplete="current-password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Войти</button>
                    </form>
                    <p class="mt-3 mb-0 text-center"><a th:href="@{/register}">Регистрация</a></p>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
