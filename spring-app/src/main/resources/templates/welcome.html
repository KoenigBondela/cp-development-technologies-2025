<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Welcome</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <div>
            <h1 class="h4 mb-0">Добро пожаловать, <span sec:authentication="name">user</span>!</h1>
            <div class="text-muted small">Роли: <span sec:authentication="authorities">—</span></div>
        </div>
        <form th:action="@{/logout}" method="post" class="m-0">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button type="submit" class="btn btn-outline-secondary btn-sm">Выйти</button>
        </form>
    </div>

    <div sec:authorize="hasRole('ADMIN')" class="mt-4">
        <h2 class="h5">Номера (admin)</h2>
        <div class="table-responsive">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Номер</th>
                    <th>Тип</th>
                    <th>Цена</th>
                    <th>Свободен</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="r : ${rooms}">
                    <td th:text="${r.id}">1</td>
                    <td th:text="${r.roomNumber}">101</td>
                    <td th:text="${r.roomType}">Std</td>
                    <td th:text="${r.pricePerNight}">0</td>
                    <td th:text="${r.isAvailable} ? 'Да' : 'Нет'">Да</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

    <div sec:authorize="hasRole('USER')" class="mt-4">
        <h2 class="h5">Ваш аккаунт (user)</h2>
        <div class="table-responsive" th:if="${me != null}">
            <table class="table table-striped table-bordered align-middle">
                <thead class="table-light">
                <tr>
                    <th>ID</th>
                    <th>Имя</th>
                    <th>Роль</th>
                    <th>Создан</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td th:text="${me.id}">1</td>
                    <td th:text="${me.username}">u</td>
                    <td th:text="${me.role}">USER</td>
                    <td th:text="${me.createdAt}">—</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
